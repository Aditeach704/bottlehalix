<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bottle Pixel Bot Console</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0c0f12; color: #c9d1d9; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 260px; background-color: #161b22; border-right: 1px solid #30363d; display: flex; flex-direction: column; padding: 20px 0; }
        .brand { padding: 0 24px 20px 24px; font-size: 1.1rem; font-weight: 700; color: #58a6ff; border-bottom: 1px solid #30363d; margin-bottom: 20px; }
        .nav-link { padding: 12px 24px; color: #8b949e; text-decoration: none; display: flex; align-items: center; gap: 12px; font-weight: 500; }
        .nav-link.active { color: #f0f6fc; background-color: #21262d; border-left: 4px solid #58a6ff; }

        .main-panel { flex: 1; display: flex; flex-direction: column; padding: 24px; overflow-y: auto; }
        .header { margin-bottom: 24px; }
        
        .status-container { display: flex; gap: 16px; margin-bottom: 24px; }
        .status-card { background-color: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; flex: 1; }
        .card-title { font-size: 0.85rem; color: #8b949e; text-transform: uppercase; margin-bottom: 6px; }
        .card-value { font-size: 1.4rem; font-weight: 600; color: #f0f6fc; }
        .status-online { color: #3fb950; }
        .status-offline { color: #f85149; }

        .terminal { background-color: #010409; border: 1px solid #30363d; border-radius: 8px; flex: 1; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        .terminal-header { background-color: #161b22; border-bottom: 1px solid #30363d; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
        .window-dots { display: flex; gap: 6px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot-red { background-color: #ff5f56; }
        .dot-yellow { background-color: #ffbd2e; }
        .dot-green { background-color: #27c93f; }
        .terminal-title { font-size: 0.85rem; font-family: monospace; color: #8b949e; }
        
        .log-container { flex: 1; padding: 16px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 0.9rem; line-height: 1.5; }
        .log-row { margin-bottom: 6px; display: flex; }
        .log-time { color: #6e7681; margin-right: 12px; user-select: none; }
        .log-text { word-break: break-all; }
        
        .info { color: #58a6ff; }
        .success { color: #3fb950; }
        .warn { color: #d29922; }
        .error { color: #f85149; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand">🔮 Bottle Pixel Hub</div>
        <a href="#" class="nav-link active">💻 Live Console</a>
        <a href="#" class="nav-link">📦 Settings</a>
    </div>

    <div class="main-panel">
        <div class="header">
            <h2>Bot Activity Workspace</h2>
        </div>

        <div class="status-container">
            <div class="status-card">
                <div class="card-title">Bot Core Network</div>
                <div class="card-value status-offline" id="status-text">CONNECTING...</div>
            </div>
            <div class="status-card">
                <div class="card-title">Active Endpoint Target</div>
                <div class="card-value" style="font-size: 1.1rem; padding-top:4px;">bottle.hopto.org:19281</div>
            </div>
            <div class="status-card">
                <div class="card-title">Session Monitor Uptime</div>
                <div class="card-value" id="uptime-text">00:00:00</div>
            </div>
        </div>

        <div class="terminal">
            <div class="terminal-header">
                <div class="window-dots">
                    <div class="dot dot-red"></div>
                    <div class="dot dot-yellow"></div>
                    <div class="dot dot-green"></div>
                </div>
                <div class="terminal-title">roam_engine_stream.log</div>
                <div></div>
            </div>
            <div class="log-container" id="log-box"></div>
        </div>
    </div>

    <script>
        const logBox = document.getElementById('log-box');
        const uptimeText = document.getElementById('uptime-text');
        const statusText = document.getElementById('status-text');

        function addLog(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const logRow = document.createElement('div');
            logRow.className = 'log-row';
            logRow.innerHTML = `<span class="log-time">[${timestamp}]</span><span class="log-text ${type}">${message}</span>`;
            logBox.appendChild(logRow);
            logBox.scrollTop = logBox.scrollHeight;
        }

        // Connect WebSocket Bridge
        const socket = new WebSocket('ws://localhost:8080');

        socket.onopen = () => {
            addLog("Socket stream gateway link opened successfully.", "success");
            statusText.innerText = 'ONLINE';
            statusText.className = 'card-value status-online';
        };

        socket.onmessage = (event) => {
            try {
                const logData = JSON.parse(event.data);
                addLog(logData.text, logData.type);
            } catch (err) {
                addLog("Received unstructured frame segment.", "warn");
            }
        };

        socket.onclose = () => {
            addLog("Socket bridge dropped. Main bot execution loop down.", "error");
            statusText.innerText = 'OFFLINE';
            statusText.className = 'card-value status-offline';
        };

        socket.onerror = () => {
            addLog("Socket bridge protocol encountered a link error.", "error");
        };

        // UI Uptime Tracker Clock
        let seconds = 0;
        setInterval(() => {
            seconds++;
            const hrs = String(Math.floor(seconds / 3600)).padStart(2, '0');
            const mins = String(Math.floor((seconds % 3600) / 60)).padStart(2, '0');
            const secs = String(seconds % 60).padStart(2, '0');
            uptimeText.innerText = `${hrs}:${mins}:${secs}`;
        }, 1000);
    </script>
</body>
</html>
